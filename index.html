<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Puzzle Dashboard</title>
    <link rel="stylesheet" href="main.css">
</head>

<body class="app">
    <span id="progress-text" class="progress-badge">
        0/0
    </span>

    <div class="app-shell">
        <header class="app-header">
            <h1 class="app-title">Daily Puzzles</h1>
            <p id="current-date" class="current-date"></p>

            <div class="actions">
                <button onclick="openAddMenu()" class="btn btn-pill btn-add">
                    + Add a Game
                </button>
                <button onclick="resetManual()" class="btn btn-pill btn-reset">
                    Reset All
                </button>
            </div>
        </header>

        <!-- Manage Games Form -->
        <div id="add-menu" class="add-menu" aria-hidden="true">
            <div class="add-menu-panel game-card">
                <div class="menu-header">
                    <h3 class="menu-title">Add New Puzzle</h3>
                    <button class="remove-btn" onclick="closeAddMenu()">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>

                <div class="menu-content">
                    <div class="form-grid">
                        <input type="text" id="new-game-name" placeholder="Name (e.g. Sudoku)" aria-label="Game name"
                            class="input-field">
                        <input type="url" id="new-game-url" placeholder="URL (https://...)" aria-label="Game URL"
                            class="input-field">
                    </div>
                    <div class="form-actions">
                        <button onclick="addNewGame()" class="btn btn-primary btn-block">
                            Add to List
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div id="game-list" class="game-list">
            <!-- Items injected by JS -->
        </div>

        <section id="recently-removed-section" class="recently-removed" hidden>
            <div class="recently-removed-header">
                <h2 class="recently-removed-title">Recently Removed</h2>
                <p class="recently-removed-subtitle">Restore a game back to your list</p>
            </div>
            <ul id="recently-removed-list" class="recently-removed-list"></ul>
        </section>

        <footer class="app-footer">
            <p>Click any card to play • Drag anywhere to reorder • Resets daily at 12am</p>
        </footer>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="script.js" defer></script>
</body>

</html>
