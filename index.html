<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Puzzle Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="main.css">
</head>

<body class="min-h-screen px-10 py-6 md:px-8 md:py-8">
    <span id="progress-text"
        class="text-xs font-bold px-3 py-1.5 bg-emerald-500/20 text-emerald-500 rounded-full border border-emerald-500/30">
        0/0
    </span>

    <div class="max-w-2xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold mb-2">Daily Puzzles</h1>
            <p id="current-date" style="color: var(--text-secondary)"></p>

            <div class="mt-4 flex flex-wrap justify-center gap-3">
                <button onclick="openAddMenu()"
                    class="text-sm font-medium px-4 py-1.5 bg-indigo-500/10 text-indigo-500 rounded-full border border-indigo-500/20 hover:bg-indigo-500/20 transition-colors">
                    + Add a Game
                </button>
                <button onclick="resetManual()"
                    class="text-sm font-medium px-4 py-1.5 bg-slate-500/10 text-slate-500 rounded-full border border-slate-500/20 hover:bg-slate-500/20 transition-colors">
                    Reset All
                </button>
            </div>
        </header>

        <!-- Manage Games Form -->
        <div id="add-menu" class="add-menu" aria-hidden="true">
            <div class="add-menu-panel p-6 rounded-2xl game-card shadow-xl">
                <div class="flex gap-4 items-center justify-between mb-4">
                    <h3 class="text-lg font-bold">Add New Puzzle</h3>
                    <button
                        class="text-sm w-8 h-8 grid place-items-center bg-red-500/10 text-red-500 rounded-full hover:bg-red-500/20 transition-colors"
                        onclick="closeAddMenu()">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>

                <div class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="text" id="new-game-name" placeholder="Name (e.g. Sudoku)" aria-label="Game name"
                            class="input-field p-3 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
                        <input type="url" id="new-game-url" placeholder="URL (https://...)" aria-label="Game URL"
                            class="input-field p-3 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div></div>
                        <button onclick="addNewGame()"
                            class="w-full py-3 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 transition-colors shadow-lg shadow-indigo-500/20">
                            Add to List
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div id="game-list" class="space-y-3">
            <!-- Items injected by JS -->
        </div>

        <footer class="mt-12 text-center text-xs opacity-50">
            <p>Click any card to play • Drag anywhere to reorder • Resets daily at 12am</p>
        </footer>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="script.js" defer></script>
</body>

</html>
